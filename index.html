<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Victim Signup</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      font-family: Arial, sans-serif;
    }

    .left-half {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: #f8f9fa;
    }

.right-half {
  flex: 1;
  position: relative;
  background: url('https://i.pinimg.com/736x/dd/f5/e0/ddf5e0914db8c17250afca6876dd9a30.jpg') center/cover no-repeat;
}

.right-half::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.3);
}

    .card {
      max-width: 420px;
      width: 100%;
      border-radius: 15px;
    }

    /* Mobile Responsive */
    @media (max-width: 768px) {
      .right-half {
        display: none;
      }
    }
  </style>
</head>

<body>

  <!-- LEFT SIDE (FORM) -->
  <div class="left-half">
    <div class="card shadow-lg p-4 bg-white">

      <h3 class="text-center mb-3">
        <i class="bi bi-person-plus-fill text-danger"></i> User Signup
      </h3>

      <form onsubmit="return validateForm()">

        <div class="input-group mb-3">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" id="name" class="form-control" placeholder="Full Name" required>
        </div>

        <div class="input-group mb-3">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" id="email" class="form-control" placeholder="Email" required>
        </div>

        <div class="input-group mb-3">
          <span class="input-group-text"><i class="bi bi-telephone"></i></span>
          <input type="text" id="phone" class="form-control" placeholder="Phone Number" required>
        </div>

        <div class="input-group mb-3">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" id="password" class="form-control" placeholder="Password" required>
        </div>

        <div class="input-group mb-3">
          <span class="input-group-text"><i class="bi bi-shield-lock"></i></span>
          <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm Password" required>
        </div>

        <button type="submit" class="btn btn-danger w-100 fw-bold">
          Register
        </button>

        <p class="text-center mt-3">
          Already have an account?
          <a href="login.html" class="fw-bold text-decoration-none">Login</a>
        </p>

      </form>
    </div>
  </div>

  <!-- RIGHT SIDE (IMAGE) -->
  <div class="right-half"></div>

  <!-- JS VALIDATION -->
  <script>
    function validateForm() {
      let password = document.getElementById("password").value;
      let confirmPassword = document.getElementById("confirmPassword").value;

      if (password !== confirmPassword) {
        alert("Passwords do not match!");
        return false;
      }

      alert("Registration Successful!");

      // Redirect
      window.location.href = "login.html";
      return false;
    }
  </script>

</body>
</html>
